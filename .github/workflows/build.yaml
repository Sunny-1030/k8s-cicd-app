name: Build, Push, and Update GitOps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/Sunny-1030/k8s-cicd-app

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout app source
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build image
      run: |
        docker build -t $IMAGE_NAME:${{ github.sha }} .
        docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

    - name: Push image
      run: |
        docker push $IMAGE_NAME:${{ github.sha }}
        docker push $IMAGE_NAME:latest

    - name: Checkout GitOps repo
      uses: actions/checkout@v4
      with:
        repository: Sunny-1030/k8s-gitops-test
        token: ${{ secrets.GITOPS_TOKEN }}
        path: gitops

    - name: Update image tag in GitOps repo
      run: |
        cd gitops
        sed -i "s|image: ghcr.io/Sunny-1030/k8s-cicd-app:.*|image: ghcr.io/Sunny-1030/k8s-cicd-app:${{ github.sha }}|g" deployment.yaml

    - name: Commit and push GitOps change
      run: |
        cd gitops
        git config user.email "ypjs09@gmail.com"
        git config user.name "github-actions"
        git add deployment.yaml
        git commit -m "update image to ${{ github.sha }}" || echo "No changes to commit"
        git push
